<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoMonitor | Login</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            
            <div class="login-header">
                <h1><i class="fas fa-leaf"></i> EcoMonitor</h1>
                <p id="form-subtitle">Sign in to view your system telemetry</p>
            </div>

            <form id="auth-form">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="name@domain.com">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>

                <button type="submit" id="auth-btn" class="btn-primary">Sign In</button>
            </form>

            <div class="auth-switch">
                <p id="toggle-text">Don't have an account? <span id="toggle-mode">Sign up here</span></p>
            </div>

        </div>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
